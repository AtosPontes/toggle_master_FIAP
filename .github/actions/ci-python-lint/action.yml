name: CI Python Lint
description: Static analysis for Python services
inputs:
  service_path:
    description: Relative path to the service root
    required: true
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python lint tools
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: |
        pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 pylint

    - name: Run flake8
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run pylint
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: pylint app.py --errors-only
