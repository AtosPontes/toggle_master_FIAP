name: CI Analytics Service

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/local/5-analytics-service/**'
      - '.github/workflows/analytics-service.yml'
      - '.github/workflows/template-ci.yml'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - 'apps/local/5-analytics-service/**'
      - '.github/workflows/analytics-service.yml'
      - '.github/workflows/template-ci.yml'
      - '.github/actions/**'

jobs:
  ci:
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/template-ci.yml
    with:
      service_name: analytics-service
      service_path: apps/local/5-analytics-service
      language: python
      ecr_repository: togglemaster_analytics-service
