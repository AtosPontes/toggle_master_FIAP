name: CI Flag Service

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/local/2-flag-service/**'
      - '.github/workflows/flag-service.yml'
      - '.github/workflows/template-ci.yml'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - 'apps/local/2-flag-service/**'
      - '.github/workflows/flag-service.yml'
      - '.github/workflows/template-ci.yml'
      - '.github/actions/**'

jobs:
  ci:
    permissions:
      contents: write
    uses: ./.github/workflows/template-ci-python.yml
    with:
      service_name: flag-service
      service_path: apps/local/2-flag-service
      ecr_repository: togglemaster_flag-service
