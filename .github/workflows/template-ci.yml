name: Template CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      language:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  build_and_unit_test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service_path }}/go.mod
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Go dependencies
        if: ${{ inputs.language == 'go' }}
        run: go mod download

      - name: Install Python dependencies
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Go tests
        if: ${{ inputs.language == 'go' }}
        run: go test ./...

      - name: Run Python tests (if available)
        if: ${{ inputs.language == 'python' }}
        run: |
          if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            pytest -q
          else
            echo "No Python unit tests found; skipping pytest."
          fi

  linter_static_analysis:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build_and_unit_test
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service_path }}/go.mod
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Go dependencies
        if: ${{ inputs.language == 'go' }}
        run: go mod download

      - name: Run golangci-lint
        if: ${{ inputs.language == 'go' }}
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service_path }}
          args: --timeout=5m --issues-exit-code=0

      - name: Install Python lint tools
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pylint

      - name: Run flake8
        if: ${{ inputs.language == 'python' }}
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pylint
        if: ${{ inputs.language == 'python' }}
        run: pylint app.py --errors-only

  security_scan:
    name: Security Scan (SCA + SAST)
    runs-on: ubuntu-latest
    needs: linter_static_analysis
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service_path }}/go.mod
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: SCA - Trivy filesystem scan (block CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: SAST - gosec (block CRITICAL)
        if: ${{ inputs.language == 'go' }}
        run: |
          go run github.com/securego/gosec/v2/cmd/gosec@v2.21.4 -severity high -confidence high ./...

      - name: Install Python security tools
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install bandit

      - name: SAST - bandit (block high severity)
        if: ${{ inputs.language == 'python' }}
        run: bandit -r . -lll

  docker_build_and_push:
    name: Docker Build, Scan and Push
    runs-on: ubuntu-latest
    needs: security_scan
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate image tag
        id: meta
        run: echo "tag=v1.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build docker image
        run: |
          docker build \
            --pull \
            -t ${{ inputs.service_name }}:${{ steps.meta.outputs.tag }} \
            -f ${{ inputs.service_path }}/Dockerfile \
            ${{ inputs.service_path }}

      - name: Container scan with Trivy (block CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ inputs.service_name }}:${{ steps.meta.outputs.tag }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: AWS auth mode
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: aws_auth_mode
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "mode=access_key" >> "$GITHUB_OUTPUT"
          else
            echo "mode=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate AWS credentials settings
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'missing' }}
        run: |
          echo "Missing AWS credentials in GitHub Secrets."
          echo "Set AWS_ROLE_TO_ASSUME (OIDC) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY."
          exit 1

      - name: Configure AWS credentials
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials (Access Key)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'access_key' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push docker image to ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker tag ${{ inputs.service_name }}:${IMAGE_TAG} ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}
          docker push ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      - name: Update GitOps deployment image tag
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          DEPLOYMENT_FILE: gitops/${{ inputs.service_name }}/deployment.yaml
        run: |
          set -euo pipefail
          NEW_IMAGE="${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"
          if [ ! -f "${DEPLOYMENT_FILE}" ]; then
            echo "GitOps file not found: ${DEPLOYMENT_FILE}"
            exit 1
          fi
          sed -i -E "s|(^[[:space:]]*image:[[:space:]]*).*$|\\1${NEW_IMAGE}|" "${DEPLOYMENT_FILE}"
          echo "Updated ${DEPLOYMENT_FILE} -> ${NEW_IMAGE}"

      - name: Commit GitOps image update
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          DEPLOYMENT_FILE: gitops/${{ inputs.service_name }}/deployment.yaml
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- "${DEPLOYMENT_FILE}"; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOYMENT_FILE}"
          git commit -m "chore(gitops): update ${{ inputs.service_name }} image to ${IMAGE_TAG}"
          git push origin HEAD:main || (
            git pull --rebase origin main &&
            git push origin HEAD:main
          )
