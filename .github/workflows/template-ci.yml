name: Template CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      language:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  build_and_unit_test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Unit Test (Go)
        if: ${{ inputs.language == 'go' }}
        uses: ./.github/actions/ci-go-build
        with:
          service_path: ${{ inputs.service_path }}

      - name: Build & Unit Test (Python)
        if: ${{ inputs.language == 'python' }}
        uses: ./.github/actions/ci-python-build
        with:
          service_path: ${{ inputs.service_path }}

  linter_static_analysis:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build_and_unit_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint / Static Analysis (Go)
        if: ${{ inputs.language == 'go' }}
        uses: ./.github/actions/ci-go-lint
        with:
          service_path: ${{ inputs.service_path }}

      - name: Lint / Static Analysis (Python)
        if: ${{ inputs.language == 'python' }}
        uses: ./.github/actions/ci-python-lint
        with:
          service_path: ${{ inputs.service_path }}

  security_scan:
    name: Security Scan (SCA + SAST)
    runs-on: ubuntu-latest
    needs: linter_static_analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SCA - Trivy filesystem scan (block CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: SAST (Go)
        if: ${{ inputs.language == 'go' }}
        uses: ./.github/actions/ci-go-sast
        with:
          service_path: ${{ inputs.service_path }}

      - name: SAST (Python)
        if: ${{ inputs.language == 'python' }}
        uses: ./.github/actions/ci-python-sast
        with:
          service_path: ${{ inputs.service_path }}

  docker_build_and_push:
    name: Docker Build, Scan and Push
    runs-on: ubuntu-latest
    needs: security_scan
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate image tag
        id: meta
        run: echo "tag=v1.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build docker image
        run: |
          docker build \
            --pull \
            -t ${{ inputs.service_name }}:${{ steps.meta.outputs.tag }} \
            -f ${{ inputs.service_path }}/Dockerfile \
            ${{ inputs.service_path }}

      - name: Container scan with Trivy (block CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ inputs.service_name }}:${{ steps.meta.outputs.tag }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: AWS auth mode
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: aws_auth_mode
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "mode=access_key" >> "$GITHUB_OUTPUT"
          else
            echo "mode=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate AWS credentials settings
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'missing' }}
        run: |
          echo "Missing AWS credentials in GitHub Secrets."
          echo "Set AWS_ROLE_TO_ASSUME (OIDC) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY."
          exit 1

      - name: Configure AWS credentials
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials (Access Key)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.aws_auth_mode.outputs.mode == 'access_key' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push docker image to ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker tag ${{ inputs.service_name }}:${IMAGE_TAG} ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}
          docker push ${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      - name: Update GitOps deployment image tag
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          DEPLOYMENT_FILE: gitops/${{ inputs.service_name }}/deployment.yaml
        run: |
          set -euo pipefail
          NEW_IMAGE="${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"
          if [ ! -f "${DEPLOYMENT_FILE}" ]; then
            echo "GitOps file not found: ${DEPLOYMENT_FILE}"
            exit 1
          fi
          sed -i -E "s|(^[[:space:]]*image:[[:space:]]*).*$|\\1${NEW_IMAGE}|" "${DEPLOYMENT_FILE}"
          echo "Updated ${DEPLOYMENT_FILE} -> ${NEW_IMAGE}"

      - name: Commit GitOps image update
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          DEPLOYMENT_FILE: gitops/${{ inputs.service_name }}/deployment.yaml
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- "${DEPLOYMENT_FILE}"; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOYMENT_FILE}"
          git commit -m "chore(gitops): update ${{ inputs.service_name }} image to ${IMAGE_TAG}"
          git push origin HEAD:main || (
            git pull --rebase origin main &&
            git push origin HEAD:main
          )
